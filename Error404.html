<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

body {
  font-family: Arial, sans-serif;
  background: url(/изображения/i.webp);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.error-container {
  margin: auto 0;
  padding: 8px;
  text-align: center;
  max-width: 500px;
  max-height: 900px;
  backdrop-filter: blur(10px);
  border: 1px Solid ;
  border-radius: 16px;
  box-shadow:
    /* Нижний и правый эффект глубины */
    inset -0.75px -0.5px rgba(255, 255, 255, 0.356),
    /* Верхний и левый эффект глубины */
    inset +0.75px +0.5px rgba(255, 255, 255, 0.233),
    /* Эффект тени */
    3px 2px 10px rgba(0, 0, 0, 0.37),
    /* Короткий подповерхностный эффект */
    inset 0px 0px 10px 5px rgba(255, 255, 255, 0.025),
    /* Длинный подповерхностный эффект */
    inset 0px 0px 40px 5px rgba(255, 255, 255, 0.096);
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #e42908;
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-title {
            font-size: 28px;
            color: #e42908;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 16px;
            color: #e42908;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .home-btn {
            display: inline-block;
            background: #cc4f30;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .home-btn:hover {
            background: #9e1212;
        }
    </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <div class="error-title">Страница не найдена</div>
    <div class="error-message">
        К сожалению, страница, которую вы ищете, не существует или была перемещена.
    </div>
    <a href="index.html" class="home-btn">Вернуться на главную</a>
</div>
</body>
</html>
