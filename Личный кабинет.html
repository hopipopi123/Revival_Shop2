<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/registr.css">
  <title>Личный кабинет</title>
</head>
<body>
  <header class="header-container">
    <div class="logo">REVIVAL</div>
    
    <button class="burger-menu" id="burgerBtn">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <nav class="nav-menu" id="navMenu">
      <ul class="header-icons">
        <li><a href="index.html">О нас</a></li>
        <li><a href="index.html">Контакты</a></li>
        <li><a href="registration.html">Регистрация</a></li>
        <li><a href="">Личный кабинет</a></li>
      </ul>
    </nav>
  </header>
  <main>

<section class="container">
<div class="profile-card">
    <div class="profile-header">
        <div class="avatar">
            <img src="изображения/icons8-аватар-50.png" alt="Фото профиля">
        </div>
        <div class="name">Петр Иванович</div>
        <div class="status">Личный кабинет</div>
    </div>
    
    <div class="profile-info">
        <div class="info-row">
            <div class="info-label">Имя:</div>
            <div class="info-value">Петр</div>
            <button class="edit-btn">Изменить</button>
        </div>
        
        <div class="info-row">
            <div class="info-label">Фамилия:</div>
            <div class="info-value">Иванович</div>
            <button class="edit-btn">Изменить</button>
        </div>
        
        <div class="info-row">
            <div class="info-label">Телефон:</div>
            <div class="info-value">+7 (916) 123-45-99</div>
            <button class="edit-btn">Изменить</button>
        </div>
        <div class="exit">
          <a href="index.html"><button class="exit_btn">Выход</button></a>
        </div>
    </div>
</div>
    </section>
  </main>
  <script src="script.js/script.js"></script>
</body>
</html>
